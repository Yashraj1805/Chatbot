<!doctype html>
<html>
<head><meta charset="utf-8"><title>VartaBot — Logo Lab v2</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:radial-gradient(60rem 40rem at 80% -10%,#0c2a28,#0d100e 60%);color:#eef1ef;padding:44px;min-height:100vh}
  h1{font-weight:800;letter-spacing:-.02em;margin:0}
  .sub{color:#97a29a;margin:6px 0 32px;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:22px}
  .card{background:linear-gradient(180deg,#181d1a,#13160f);border:1px solid #262d29;border-radius:20px;padding:22px}
  .card h3{margin:0 0 2px;font-size:15px;display:flex;align-items:center;gap:8px}
  .card p{margin:0 0 18px;font-size:12px;color:#8b958d;line-height:1.5}
  .live{font-size:9px;font-weight:800;letter-spacing:.06em;color:#0d100e;background:#34dba4;padding:2px 7px;border-radius:99px}
  .row{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .mark{transition:transform .35s cubic-bezier(.22,1,.36,1);cursor:pointer}
  .mark:hover{transform:translateY(-3px) scale(1.06)}
  .light{background:#f4f6f5;border-radius:14px;padding:14px 16px;margin-top:16px;display:flex;align-items:center;gap:11px}
  .word{font-weight:800;font-size:23px;letter-spacing:-.02em;color:#161b18}
  .word .b{color:#0d8983}
  .tiny{margin-top:14px;font-size:11px;color:#6a766e;display:flex;align-items:center;gap:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  @keyframes shine{0%{transform:translateX(-130%) skewX(-18deg)}60%,100%{transform:translateX(230%) skewX(-18deg)}}
  .shineWrap{position:relative;display:inline-block;border-radius:24%;overflow:hidden}
  .shineWrap::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);width:55%;animation:shine 3.4s ease-in-out infinite}
</style></head>
<body>
  <h1>VartaBot — Logo Lab v2 ✦</h1>
  <p class="sub">Premium / glossy concepts. Hover karo, animation dekho. Phir batao kaunsa lock karein (1–6).</p>
  <div class="grid" id="grid"></div>

<script>
// shared defs: vibrant base gradient + glossy top highlight + glyph shadow
function defs(id, stops){
  return `<defs>
    <linearGradient id="b${id}" x1="3" y1="2" x2="37" y2="38" gradientUnits="userSpaceOnUse">${stops}</linearGradient>
    <radialGradient id="gl${id}" cx="0.32" cy="0.18" r="0.85"><stop offset="0" stop-color="#fff" stop-opacity="0.5"/><stop offset="0.55" stop-color="#fff" stop-opacity="0"/></radialGradient>
    <filter id="sh${id}" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="0.8" stdDeviation="0.9" flood-color="#003b37" flood-opacity="0.45"/></filter>
  </defs>`;
}
const TEAL = `<stop stop-color="#16d6c4"/><stop offset="0.5" stop-color="#10b8a6"/><stop offset="1" stop-color="#0e8f6f"/>`;
const AQUA = `<stop stop-color="#22d3ee"/><stop offset="0.5" stop-color="#14b6c7"/><stop offset="1" stop-color="#10b981"/>`;
const LIME = `<stop stop-color="#2bd4a8"/><stop offset="0.5" stop-color="#13b8a4"/><stop offset="1" stop-color="#0a8f83"/>`;

const glossTile = (id)=>`<rect width="40" height="40" rx="11" fill="url(#b${id})"/><rect width="40" height="40" rx="11" fill="url(#gl${id})"/><rect x="0.6" y="0.6" width="38.8" height="38.8" rx="10.6" fill="none" stroke="#fff" stroke-opacity="0.28" stroke-width="0.8"/>`;

// 1 — Glossy bubble + sparkle (app-icon)
const L1=(s,id)=>`<svg width="${s}" height="${s}" viewBox="0 0 40 40">${defs(id,TEAL)}
  ${glossTile(id)}
  <g filter="url(#sh${id})">
    <path d="M11 10.5h18a4.5 4.5 0 0 1 4.5 4.5v7a4.5 4.5 0 0 1-4.5 4.5h-9.5l-5.6 4.3a1 1 0 0 1-1.6-.8V26.5H11A4.5 4.5 0 0 1 6.5 22v-7A4.5 4.5 0 0 1 11 10.5Z" fill="#fff"/>
  </g>
  <path d="M20 14.2c.5 3.4 1.1 4 4.5 4.5-3.4.5-4 1.1-4.5 4.5-.5-3.4-1.1-4-4.5-4.5 3.4-.5 4-1.1 4.5-4.5Z" fill="url(#b${id})"/>
</svg>`;

// 2 — Liquid chat droplet (organic blob bubble, glossy)
const L2=(s,id)=>`<svg width="${s}" height="${s}" viewBox="0 0 40 40">${defs(id,AQUA)}
  ${glossTile(id)}
  <g filter="url(#sh${id})">
    <path d="M20 7c7.7 0 13 4.9 13 12 0 6.6-5.3 11.3-12 11.3-1.6 0-3.2-.3-4.6-.8l-5 1.9a.8.8 0 0 1-1.05-1l1.7-4.6C9.6 27 7 23.4 7 19 7 11.9 12.3 7 20 7Z" fill="#fff"/>
  </g>
  <g fill="url(#b${id})"><circle cx="14.5" cy="19" r="1.8"/><circle cx="20" cy="19" r="1.8"/><circle cx="25.5" cy="19" r="1.8"/></g>
</svg>`;

// 3 — Rotating conic halo + bubble (animated)
const L3=(s,id)=>`<span class="mark" style="position:relative;display:inline-block;width:${s}px;height:${s}px">
  <span style="position:absolute;inset:-2px;border-radius:30%;background:conic-gradient(from 0deg,#16d6c4,#22d3ee,#2bd4a8,#0e8f6f,#16d6c4);animation:spin 6s linear infinite;filter:blur(1px)"></span>
  <svg width="${s}" height="${s}" viewBox="0 0 40 40" style="position:relative">${defs(id,TEAL)}
    <rect x="2.5" y="2.5" width="35" height="35" rx="9" fill="#0d100e"/>
    <rect x="2.5" y="2.5" width="35" height="35" rx="9" fill="url(#gl${id})" opacity="0.4"/>
    <path d="M12 13.5h16a3.5 3.5 0 0 1 3.5 3.5v5a3.5 3.5 0 0 1-3.5 3.5h-8.4l-4.4 3.3a.9.9 0 0 1-1.44-.72V25.5H12A3.5 3.5 0 0 1 8.5 22v-5A3.5 3.5 0 0 1 12 13.5Z" fill="url(#b${id})"/>
  </svg></span>`;

// 4 — Duotone overlapping bubbles (blend, dialogue)
const L4=(s,id)=>`<svg width="${s}" height="${s}" viewBox="0 0 40 40">${defs(id,LIME)}
  ${glossTile(id)}
  <g filter="url(#sh${id})">
    <path d="M9 11h12.5a3 3 0 0 1 3 3v4.5a3 3 0 0 1-3 3h-6l-3.6 2.7a.8.8 0 0 1-1.3-.64V21.5H9a3 3 0 0 1-3-3V14a3 3 0 0 1 3-3Z" fill="#fff" opacity="0.92"/>
    <path d="M31 17H20.5a3 3 0 0 0-3 3v4.5a3 3 0 0 0 3 3h5l3.4 2.6a.8.8 0 0 0 1.28-.64V27.5H31a3 3 0 0 0 3-3V20a3 3 0 0 0-3-3Z" fill="#bff7ec" style="mix-blend-mode:screen"/>
  </g>
</svg>`;

// 5 — Neon glass "V" (frosted, glows on dark)
const L5=(s,id)=>`<svg width="${s}" height="${s}" viewBox="0 0 40 40">${defs(id,AQUA)}
  <rect width="40" height="40" rx="11" fill="#0e1413"/>
  <rect width="40" height="40" rx="11" fill="url(#b${id})" opacity="0.18"/>
  <rect x="0.6" y="0.6" width="38.8" height="38.8" rx="10.6" fill="none" stroke="#fff" stroke-opacity="0.18" stroke-width="0.8"/>
  <g filter="url(#sh${id})"><path d="M12 13 20 28 28 13" stroke="url(#b${id})" stroke-width="4.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
  <circle cx="29" cy="12.5" r="2.6" fill="#16d6c4"/>
</svg>`;

// 6 — Mesh gradient + crisp white "V" monogram
const L6=(s,id)=>`<svg width="${s}" height="${s}" viewBox="0 0 40 40">
  <defs>
    <radialGradient id="m1${id}" cx="0.15" cy="0.1" r="0.9"><stop stop-color="#34e3c0"/><stop offset="1" stop-color="#34e3c0" stop-opacity="0"/></radialGradient>
    <radialGradient id="m2${id}" cx="0.95" cy="0.2" r="0.9"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <radialGradient id="m3${id}" cx="0.6" cy="1" r="1"><stop stop-color="#0a8f6f"/><stop offset="1" stop-color="#0a8f6f" stop-opacity="0"/></radialGradient>
    <filter id="sh${id}"><feDropShadow dx="0" dy="0.8" stdDeviation="0.9" flood-color="#00302c" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="40" height="40" rx="11" fill="#11b39a"/>
  <rect width="40" height="40" rx="11" fill="url(#m1${id})"/>
  <rect width="40" height="40" rx="11" fill="url(#m2${id})"/>
  <rect width="40" height="40" rx="11" fill="url(#m3${id})"/>
  <rect x="0.6" y="0.6" width="38.8" height="38.8" rx="10.6" fill="none" stroke="#fff" stroke-opacity="0.3" stroke-width="0.8"/>
  <g filter="url(#sh${id})"><path d="M12 13 20 28 28 13" stroke="#fff" stroke-width="4.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
</svg>`;

const concepts=[
  {n:'1 · Glossy bubble + spark', d:'App-icon style: glossy gradient, depth shadow, spark inside. Clean & premium.', fn:L1, anim:false},
  {n:'2 · Liquid chat droplet', d:'Organic blob speech bubble with typing dots. Soft, friendly, modern.', fn:L2, anim:false},
  {n:'3 · Conic halo bubble', d:'Rotating gradient halo around a dark glass tile. Eye-catching, alive.', fn:L3, anim:true},
  {n:'4 · Duotone dialogue', d:'Two overlapping bubbles with a screen-blend glow = two-way Varta.', fn:L4, anim:false},
  {n:'5 · Neon glass V', d:'Frosted dark tile + glowing teal "V". Looks 🔥 on dark navbars.', fn:L5, anim:false},
  {n:'6 · Mesh gradient V', d:'Vibrant multi-point mesh + crisp white V monogram. Bold & branded.', fn:L6, anim:false},
];

document.getElementById('grid').innerHTML = concepts.map((c,idx)=>{
  const id='c'+idx;
  const big = c.anim ? c.fn(72,id+'a') : `<span class="mark shineWrap">${c.fn(72,id+'a')}</span>`;
  return `<div class="card">
    <h3>${c.n} ${c.anim?'<span class="live">LIVE</span>':''}</h3>
    <p>${c.d}</p>
    <div class="row">${big}<span class="mark">${c.fn(44,id+'b')}</span><span class="mark">${c.fn(28,id+'c')}</span></div>
    <div class="light"><span>${c.fn(34,id+'l')}</span><span class="word">Varta<span class="b">Bot</span></span></div>
    <div class="tiny">favicon 16px → <span>${c.fn(16,id+'f')}</span></div>
  </div>`;
}).join('');
</script>
</body></html>
