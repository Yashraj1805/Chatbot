<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VartaBot — Logo Design Exploration</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#F7F8F7;color:#16201d;padding:56px 24px}
  .head{text-align:center;max-width:720px;margin:0 auto 48px}
  .head h1{font-weight:300;font-size:clamp(40px,7vw,72px);letter-spacing:.04em}
  .head .tag{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;opacity:.45;margin:14px 0}
  .sw{display:inline-flex;gap:18px;font-family:'Courier New',monospace;font-size:12px;opacity:.65;margin-top:6px}
  .sw span{display:inline-flex;align-items:center;gap:7px}
  .sw i{width:14px;height:14px;border-radius:4px;display:inline-block}
  .grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:40px}
  .card{background:#fff;border:1px solid #e6ebe8;border-radius:20px;padding:30px;transition:transform .5s cubic-bezier(.16,1,.3,1),box-shadow .5s}
  .card:hover{transform:translateY(-5px);box-shadow:0 24px 60px -20px rgba(13,137,131,.35)}
  .canvas{height:150px;display:flex;align-items:center;justify-content:center;color:#0d8983}
  .canvas svg{width:120px;height:120px}
  .sizes{display:flex;align-items:flex-end;justify-content:center;gap:16px;color:#0d8983;margin:18px 0 22px;opacity:.85}
  .num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#0d8983;color:#fff;font-size:12px;font-weight:700;margin-right:8px}
  .card h2{font-size:19px;font-weight:600;letter-spacing:.02em;display:flex;align-items:center}
  .card .sub{font-family:'Courier New',monospace;font-size:11px;letter-spacing:.12em;opacity:.5;margin:6px 0 14px}
  .card p{font-size:13.5px;line-height:1.6;opacity:.72;font-weight:300}
  .foot{text-align:center;font-family:'Courier New',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;opacity:.4;margin-top:52px;line-height:2}
</style>
</head>
<body>
  <div class="head">
    <h1>VartaBot</h1>
    <div class="tag">No-code chatbots · Conversation, simplified</div>
    <div class="sw">
      <span><i style="background:#0d8983"></i>brand #0d8983</span>
      <span><i style="background:#19cf99"></i>accent #19cf99</span>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="foot">Generated with the logo-generator skill<br>2026 · pick 1–6 to refine</div>

<script>
// Each logo as an SVG string (currentColor → teal via .canvas)
const L = {};
L[1] = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs><clipPath id="l1c"><circle cx="60" cy="50" r="23"/></clipPath></defs>
  <g fill="none" stroke="currentColor" stroke-width="3.5"><circle cx="40" cy="50" r="23"/><circle cx="60" cy="50" r="23"/></g>
  <circle cx="40" cy="50" r="23" clip-path="url(#l1c)" fill="currentColor"/></svg>`;
L[2] = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><g fill="currentColor">
  <circle cx="33" cy="63" r="7.5"/><circle cx="51" cy="51" r="5.8"/><circle cx="66" cy="41" r="4"/><circle cx="77" cy="34" r="2.4" opacity="0.5"/></g></svg>`;
L[3] = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="35" cy="50" r="6.5" fill="currentColor"/>
  <g fill="none" stroke="currentColor" stroke-linecap="round">
    <path d="M 50 37 A 19 19 0 0 1 50 63" stroke-width="3.5"/>
    <path d="M 59 30 A 29 29 0 0 1 59 70" stroke-width="3" opacity="0.62"/>
    <path d="M 68 23 A 39 39 0 0 1 68 77" stroke-width="2.5" opacity="0.38"/></g></svg>`;
L[4] = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <path d="M 30 26 H 70 A 10 10 0 0 1 80 36 V 56 A 10 10 0 0 1 70 66 H 48 L 34 78 V 66 H 30 A 10 10 0 0 1 20 56 V 36 A 10 10 0 0 1 30 26 Z" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round"/>
  <g fill="currentColor"><circle cx="39" cy="46" r="3.6"/><circle cx="50" cy="46" r="3.6"/><circle cx="61" cy="46" r="3.6"/></g></svg>`;
L[5] = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><path d="M 29 30 L 50 65 L 71 30"/></g>
  <circle cx="50" cy="65" r="5" fill="currentColor"/><circle cx="71" cy="30" r="4.5" fill="currentColor"/></svg>`;
L[6] = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <path d="M 22 30 H 46 A 6 6 0 0 1 52 36 V 48 A 6 6 0 0 1 46 54 H 34 L 26 61 V 54 H 22 A 6 6 0 0 1 16 48 V 36 A 6 6 0 0 1 22 30 Z" fill="currentColor"/>
  <path d="M 54 46 H 78 A 6 6 0 0 1 84 52 V 64 A 6 6 0 0 1 78 70 H 74 L 66 77 V 70 H 54 A 6 6 0 0 1 48 64 V 52 A 6 6 0 0 1 54 46 Z" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round"/></svg>`;

const data = [
  ['Dialogue Overlap','PURE GEOMETRIC · BOOLEAN','Do circles overlap — beech ka shared lens fill — conversation literally do awaazon ka overlap. "Varta" ka direct meaning, max restraint.'],
  ['Speech Trail','DOT MATRIX · ASYMMETRIC','Charhte-shrink hote 4 dots = message in motion, live chat. Asymmetry energy deti hai; favicon size par bhi crisp.'],
  ['Voice Waves','LINE SYSTEM · RADIATING','Ek solid source se radiating arcs = awaaz, signal, "aapki baat suni gayi". 3 strokes se depth. Calm & confident.'],
  ['Chat Bubble','GEOMETRY + DOTS','Universal speech bubble + live typing dots. Sabse direct "chatbot" read — clean weight, rounded tail.'],
  ['The V Mark','MONOGRAM · LINES + NODE','Do strokes ek node me milte = do awaazein ek samvaad me, aur "V" of VartaBot. Top dot = live status. Bold & ownable.'],
  ['Two-Way','LAYERED · ASK + REPLY','Solid bubble (sawaal) + outline bubble (jawaab) = do-taraf samvaad ek compact premium mark me.'],
];

document.getElementById('grid').innerHTML = data.map((d,i)=>{
  const n=i+1;
  return `<div class="card">
    <div class="canvas">${L[n]}</div>
    <div class="sizes">
      <span style="width:46px;height:46px">${L[n]}</span>
      <span style="width:28px;height:28px">${L[n]}</span>
      <span style="width:16px;height:16px">${L[n]}</span>
    </div>
    <h2><span class="num">${n}</span>${d[0]}</h2>
    <div class="sub">${d[1]}</div>
    <p>${d[2]}</p>
  </div>`;
}).join('');
// make the favicon-size spans size their svg
document.querySelectorAll('.sizes span').forEach(s=>{const svg=s.querySelector('svg');if(svg){svg.style.width='100%';svg.style.height='100%';}});
</script>
</body>
</html>
